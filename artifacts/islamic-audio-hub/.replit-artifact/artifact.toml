kind = "mobile"
previewPath = "/"
title = "Islamic Audio Hub"
version = "1.0.0"
id = "artifacts/islamic-audio-hub"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24192

[services.development]
run = "pnpm --filter @workspace/islamic-audio-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/islamic-audio-hub", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/islamic-audio-hub", "run", "serve" ]

[services.env]
PORT = "24192"
BASE_PATH = "/"
